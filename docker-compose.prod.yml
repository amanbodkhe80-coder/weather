version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: weatherdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d weatherdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  data-ingester:
    build: ./data-ingester
    restart: always
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/weatherdb
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHON_SERVICE_URL=http://data-ingester:8000
    depends_on:
      redis:
        condition: service_healthy
      data-ingester:
        condition: service_started

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"    # Opening strictly Port 80
    restart: always
    depends_on:
      - api-gateway

volumes:
  postgres_data:
